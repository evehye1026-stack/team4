<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예상 면접질문 · SHIPYARD Careers</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="interview-questions.css">
</head>
<body>
<a class="skip-link" href="#main">본문 바로가기</a>

<!-- 상단바 + 공지 배너 + GNB: 스크롤해도 항상 화면 위에 고정 (모든 페이지 공용 — topbar.js) -->
<div class="site-header">
  <header class="topbar">
    <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
      <h1>SHIPYARD</h1>
      <span class="badge">개발 직군 전용</span>
    </a>
    <div class="topbar-right">
      <div class="topbar-auth" id="topbar-auth-guest">
        <button class="pill" id="topbar-login-btn">로그인</button>
        <button class="pill active" id="topbar-signup-btn">회원가입</button>
      </div>
      <div class="topbar-auth" id="topbar-auth-user" style="display:none;">
        <span class="topbar-account-email" id="topbar-account-email"></span>
        <button class="pill" id="topbar-logout-btn">로그아웃</button>
      </div>
      <button class="global-search-btn" id="global-search-btn" aria-label="검색 열기" aria-expanded="false" aria-controls="search-drawer">🔍</button>
    </div>
  </header>

  <!-- 공지 배너 -->
  <div class="announce-banner" id="announce-banner">
    <span>🚀 SHIPYARD FFWD · 신입/경력 개발자 상시모집</span>
    <button class="announce-close" id="announce-close" aria-label="배너 닫기">✕</button>
  </div>

  <!-- GNB (최상단 내비게이션) -->
  <nav class="gnb">
    <a class="gnb-btn" href="index.html">채용</a>
    <a class="gnb-btn" href="index.html#resume">이력서</a>
    <span class="gnb-btn active" aria-current="page">예상면접</span>
  </nav>
</div>

<!-- 전역 검색 드로어 (화면 오른쪽에서 슬라이드 인) -->
<div class="search-drawer-backdrop" id="search-drawer-backdrop"></div>
<aside class="search-drawer" id="search-drawer" aria-hidden="true">
  <div class="search-drawer-head">
    <h3>공고 검색</h3>
    <button class="search-drawer-close" id="search-drawer-close" aria-label="검색 닫기">✕</button>
  </div>
  <input type="text" id="search-input" class="search-input" placeholder="포지션, 회사, 기술스택으로 검색">

  <div class="filter-bar">
    <div class="filter-group">
      <label>지역</label>
      <select id="f-city"></select>
    </div>
  </div>

  <div class="list-toolbar">
    <span class="result-count" id="search-count"></span>
    <div class="sort-select">
      <label>정렬</label>
      <select id="search-sort"></select>
    </div>
  </div>

  <div id="search-cards" class="card-grid search-drawer-cards"></div>
</aside>

<!-- 로그인/회원가입 드로어 (화면 오른쪽에서 슬라이드 인) -->
<div class="search-drawer-backdrop" id="auth-drawer-backdrop"></div>
<aside class="search-drawer" id="auth-drawer" aria-hidden="true">
  <div class="search-drawer-head">
    <h3>로그인 / 회원가입</h3>
    <button class="search-drawer-close" id="auth-drawer-close" aria-label="닫기">✕</button>
  </div>
  <input type="email" id="auth-email" class="search-input" placeholder="이메일">
  <input type="password" id="auth-password" class="search-input" placeholder="비밀번호 (6자 이상)">
  <div class="auth-actions">
    <button class="pill active" id="auth-login-btn">로그인</button>
    <button class="pill" id="auth-signup-btn">회원가입</button>
  </div>
  <p class="auth-message" id="auth-message"></p>
</aside>

<main id="main" class="iq-main">

  <section class="iq-job-context" aria-label="선택된 공고 정보">
    <div class="iq-job-select-row">
      <label for="job-select" class="mono-label">공고 선택</label>
      <select id="job-select" class="iq-select" aria-label="면접질문을 확인할 공고 선택"></select>
    </div>
    <div class="iq-job-card" id="job-card"></div>
  </section>

  <section class="iq-header">
    <span class="mono-label" id="iq-category-label">SERVER</span>
    <h1 class="iq-title">예상 면접질문</h1>
    <p class="iq-sub">서로 다른 코드가 모여 하나의 제품이 됩니다 — 지원 전, 이 직무에서 자주 나오는 질문을 먼저 확인하세요.</p>
  </section>

  <div class="iq-fallback-banner" id="fallback-banner" role="status" hidden>
    이 직무의 질문이 아직 준비되지 않아, 공통 질문을 대신 보여드려요.
  </div>

  <div class="iq-toolbar">
    <div class="iq-tabs" role="tablist" aria-label="질문 유형 필터">
      <button class="iq-tab active" role="tab" data-type="전체" aria-selected="true">전체</button>
      <button class="iq-tab" role="tab" data-type="기술" aria-selected="false">기술</button>
      <button class="iq-tab" role="tab" data-type="인성" aria-selected="false">인성</button>
      <button class="iq-tab" role="tab" data-type="경험" aria-selected="false">경험</button>
    </div>
    <div class="iq-toolbar-right">
      <span class="mono-label" id="iq-count">0개 질문</span>
      <button type="button" class="mono-label iq-bookmark-count" id="iq-bookmark-count" aria-pressed="false">스크랩 0</button>
      <button class="iq-cta" id="practice-start-btn">연습해보기 →</button>
    </div>
  </div>

  <ul class="iq-list" id="iq-list" aria-label="예상 면접질문 목록"></ul>

</main>

<!-- 연습 모드 (카드 뒤집기) -->
<div class="iq-practice-backdrop" id="practice-backdrop" hidden>
  <div class="iq-practice-panel" role="dialog" aria-modal="true" aria-label="면접질문 연습 모드">
    <div class="iq-practice-head">
      <span class="mono-label" id="practice-progress">01 / 07</span>
      <button class="iq-icon-btn" id="practice-close-btn" aria-label="연습 모드 닫기">✕</button>
    </div>

    <div class="iq-flashcard" id="iq-flashcard" tabindex="0" role="button" aria-pressed="false" aria-label="카드를 클릭하거나 스페이스바를 누르면 답변 팁이 보여요">
      <span class="mono-label iq-flashcard-type" id="flashcard-type">기술</span>
      <p class="iq-flashcard-question" id="flashcard-question"></p>
      <div class="iq-flashcard-tip" id="flashcard-tip" hidden>
        <span class="mono-label">답변 팁</span>
        <p id="flashcard-tip-text"></p>
      </div>
      <span class="iq-flashcard-hint" id="flashcard-hint">클릭하거나 스페이스바를 눌러 답변 팁 보기</span>
    </div>

    <label class="iq-note-label mono-label" for="practice-note">나의 답변 메모 <span class="iq-note-scope">(이 브라우저에만 저장돼요)</span></label>
    <textarea id="practice-note" class="iq-note" rows="3" placeholder="이 질문에 어떻게 답할지 메모해보세요"></textarea>

    <div class="iq-practice-nav">
      <button class="iq-nav-btn" id="practice-prev-btn">← 이전</button>
      <button class="iq-bookmark-btn" id="practice-bookmark-btn" aria-pressed="false">☆ 스크랩</button>
      <button class="iq-nav-btn" id="practice-next-btn">다음 →</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="data.js"></script>
<script src="topbar.js"></script>
<script src="interview-questions-data.js"></script>
<script src="interview-questions.js"></script>
</body>
</html>
